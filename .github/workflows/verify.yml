name: Verify Refactor

on:
  push:
    branches: [ main, refactor ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scanner-api/package.json
      - name: Install API dependencies
        run: npm install --package-lock=false
        working-directory: scanner-api
      - name: Generate Prisma client
        run: npm exec -- prisma generate
        working-directory: scanner-api
      - name: Build API
        run: npm run build
        working-directory: scanner-api

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scanner-ui/package.json
      - name: Install UI dependencies
        run: npm install --package-lock=false
        working-directory: scanner-ui
      - name: Build UI
        run: npm run build
        working-directory: scanner-ui

  discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scanner-discord/package.json
      - name: Install Discord dependencies
        run: npm install --package-lock=false
        working-directory: scanner-discord
      - name: Build Discord service
        run: npm run build
        working-directory: scanner-discord

  transcribe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install transcription dependencies
        run: pip install -r requirements.txt
        working-directory: scanner-transcribe
      - name: Compile Python sources
        run: python -m compileall src
        working-directory: scanner-transcribe

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate source compose file
        run: docker compose -f docker-compose.yml config > /dev/null
      - name: Validate prebuilt compose file
        env:
          DOCKER_ORG: dadud
          DOCKER_REGISTRY: ghcr.io
          IMAGE_TAG: refactor
        run: docker compose -f docker-compose.prebuilt.yml config > /dev/null
