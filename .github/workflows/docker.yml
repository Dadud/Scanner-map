name: Build and Push Images

on:
  push:
    branches: [ main, refactor ]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./scanner-api
          push: true
          tags: |
            ghcr.io/Dadud/scanner-map-api:${{ github.ref_name }}
            ghcr.io/Dadud/scanner-map-api:${{ github.sha }}
            ghcr.io/Dadud/scanner-map-api:latest
          platforms: linux/amd64

  transcribe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./scanner-transcribe
          push: true
          tags: |
            ghcr.io/Dadud/scanner-map-transcribe:${{ github.ref_name }}
            ghcr.io/Dadud/scanner-map-transcribe:${{ github.sha }}
            ghcr.io/Dadud/scanner-map-transcribe:latest
          platforms: linux/amd64

  discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./scanner-discord
          push: true
          tags: |
            ghcr.io/Dadud/scanner-map-discord:${{ github.ref_name }}
            ghcr.io/Dadud/scanner-map-discord:${{ github.sha }}
            ghcr.io/Dadud/scanner-map-discord:latest
          platforms: linux/amd64

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./scanner-ui
          push: true
          tags: |
            ghcr.io/Dadud/scanner-map-ui:${{ github.ref_name }}
            ghcr.io/Dadud/scanner-map-ui:${{ github.sha }}
            ghcr.io/Dadud/scanner-map-ui:latest
          platforms: linux/amd64