version: '3.8'

services:
  api:
    build:
      context: ./scanner-api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://scanner:scanner@postgres:5432/scanner
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  transcription:
    build:
      context: ./scanner-transcribe
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
      - TRANSCRIPTION_MODE=local
      - TRANSCRIPTION_DEVICE=cpu
      - WHISPER_MODEL=base
    depends_on:
      - redis
    restart: unless-stopped

  discord:
    build:
      context: ./scanner-discord
      dockerfile: Dockerfile
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - REDIS_URL=redis://redis:6379
      - API_URL=http://api:3000
    depends_on:
      - redis
    restart: unless-stopped

  ui:
    build:
      context: ./scanner-ui
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=scanner
      - POSTGRES_PASSWORD=scanner
      - POSTGRES_DB=scanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: