version: '3.8'

x-common-env: &common-env
  POSTGRES_USER: ${POSTGRES_USER:-scanner}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanner}
  POSTGRES_DB: ${POSTGRES_DB:-scanner}
  REDIS_URL: redis://scanner-redis:6379
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production}

services:
  scanner-api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_ORG:-dadud}/scanner-map-api:${IMAGE_TAG:-latest}
    container_name: scanner-api
    ports:
      - "3000:3000"
    environment:
      <<: *common-env
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-scanner}:${POSTGRES_PASSWORD:-scanner}@scanner-postgres:5432/${POSTGRES_DB:-scanner}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      GEOCODING_PROVIDER: ${GEOCODING_PROVIDER:-locationiq}
      LOCATIONIQ_API_KEY: ${LOCATIONIQ_API_KEY}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      TRANSCRIPTION_MODE: ${TRANSCRIPTION_MODE:-local}
      FASTER_WHISPER_URL: ${FASTER_WHISPER_URL:-http://scanner-transcribe:8001}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
      ENABLE_AUTH: ${ENABLE_AUTH:-false}
    depends_on:
      scanner-postgres:
        condition: service_healthy
      scanner-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - scanner-network

  scanner-transcribe:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_ORG:-dadud}/scanner-map-transcribe:${IMAGE_TAG:-latest}
    container_name: scanner-transcribe
    ports:
      - "8001:8001"
    environment:
      TRANSCRIPTION_MODE: ${TRANSCRIPTION_MODE:-local}
      TRANSCRIPTION_DEVICE: ${TRANSCRIPTION_DEVICE:-cpu}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: redis://scanner-redis:6379
      ENABLE_TONE_DETECTION: ${ENABLE_TONE_DETECTION:-false}
    depends_on:
      scanner-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scanner-network
    deploy:
      resources:
        limits:
          memory: 4G

  scanner-discord:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_ORG:-dadud}/scanner-map-discord:${IMAGE_TAG:-latest}
    container_name: scanner-discord
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      REDIS_URL: redis://scanner-redis:6379
      API_URL: http://scanner-api:3000
      DISCORD_ALERT_CHANNEL_ID: ${DISCORD_ALERT_CHANNEL_ID}
      DISCORD_SUMMARY_CHANNEL_ID: ${DISCORD_SUMMARY_CHANNEL_ID}
    depends_on:
      scanner-api:
        condition: service_healthy
      scanner-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scanner-network
    profiles:
      - discord

  scanner-ui:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_ORG:-dadud}/scanner-map-ui:${IMAGE_TAG:-latest}
    container_name: scanner-ui
    ports:
      - "80:80"
    depends_on:
      - scanner-api
    restart: unless-stopped
    networks:
      - scanner-network

  scanner-postgres:
    image: postgres:16-alpine
    container_name: scanner-postgres
    environment:
      <<: *common-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanner}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scanner-network

  scanner-redis:
    image: redis:7-alpine
    container_name: scanner-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scanner-network

volumes:
  postgres_data:
  redis_data:

networks:
  scanner-network:
    driver: bridge
